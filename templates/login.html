<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login – CareerBoost</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0f14;--card:#242838;--border:rgba(255,255,255,0.08);
  --text:#e8eaf2;--muted:#8b90a8;--accent:#5b9cf6;--danger:#f46b6b;
  --serif:'DM Serif Display',serif;--sans:'DM Sans',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px;width:100%;max-width:420px}
.logo{font-family:var(--serif);font-size:28px;text-align:center;margin-bottom:8px}
.logo span{color:var(--accent)}
.subtitle{text-align:center;color:var(--muted);font-size:14px;margin-bottom:32px}
.form-group{margin-bottom:20px}
label{display:block;font-size:13px;color:var(--muted);margin-bottom:8px}
input{width:100%;padding:12px 16px;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:var(--sans);font-size:15px;outline:none;transition:border-color .2s}
input:focus{border-color:var(--accent)}
.btn{width:100%;padding:14px;background:var(--accent);border:none;border-radius:10px;color:#fff;font-family:var(--sans);font-size:15px;font-weight:600;cursor:pointer;transition:all .2s;margin-top:8px}
.btn:hover{background:#4a8ce8;transform:translateY(-1px)}
.error{background:rgba(244,107,107,0.1);border:1px solid var(--danger);color:var(--danger);padding:12px;border-radius:8px;font-size:14px;margin-bottom:20px;text-align:center}
.link{text-align:center;margin-top:24px;font-size:14px;color:var(--muted)}
.link a{color:var(--accent);text-decoration:none}
</style>
</head>
<body>
<div class="card">
  <div class="logo">Career<span>Boost</span></div>
  <p class="subtitle">Welcome back! Log in to continue.</p>
  
  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}
  
  <form method="POST">
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" name="email" placeholder="you@example.com" required/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" name="password" placeholder="Your password" required/>
    </div>
    <button type="submit" class="btn">Log In</button>
  </form>
  
  <div class="link">Don't have an account? <a href="/register">Register here</a></div>
</div>
</body>
</html>

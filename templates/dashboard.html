<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Dashboard – CareerBoost</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d0f14;--card:#242838;--border:rgba(255,255,255,0.08);--text:#e8eaf2;--muted:#8b90a8;--accent:#5b9cf6;--serif:'DM Serif Display',serif;--sans:'DM Sans',sans-serif;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;padding:40px 24px}
.container{max-width:800px;margin:0 auto}
.logo{font-family:var(--serif);font-size:24px;margin-bottom:40px}
.logo span{color:var(--accent)}
h1{font-family:var(--serif);font-size:36px;margin-bottom:8px}
p{color:var(--muted);margin-bottom:32px}
.actions{display:flex;gap:16px;flex-wrap:wrap}
.btn{padding:14px 28px;border-radius:10px;font-family:var(--sans);font-weight:600;font-size:15px;cursor:pointer;border:none;text-decoration:none;display:inline-block}
.btn-primary{background:var(--accent);color:#fff}
.btn-outline{background:transparent;color:var(--text);border:1px solid var(--border)}
.btn-outline:hover{border-color:var(--accent);color:var(--accent)}
</style>
</head>
<body>
<div class="container">
  <div class="logo">Career<span>Boost</span></div>
  <h1>Welcome back, {{ name }}! 👋</h1>
  <p>What would you like to do today?</p>
  <div class="actions">
    <a href="/" class="btn btn-primary">Analyze My Resume</a>
    <a href="/logout" class="btn btn-outline">Logout</a>
  </div>
</div>
</body>
</html>
